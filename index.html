<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ES Blanquefort Basket Ball — Portail licencié</title>
<meta name="theme-color" content="#003914">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<style>
:root{--g:#003914;--d:#001f0c;--m:#56695c;--line:rgba(0,57,20,.24)}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:linear-gradient(135deg,#fff 0%,#f7fbf6 58%,#eef5ed 100%);color:#082313;display:grid;place-items:center;padding:24px;position:relative;overflow:hidden}
body:before{content:"";position:absolute;left:-180px;top:-170px;width:640px;height:340px;background:linear-gradient(135deg,var(--d),var(--g));border-radius:0 0 86% 0;box-shadow:0 24px 60px rgba(0,31,12,.18)}
.card{position:relative;z-index:1;max-width:880px;width:100%;background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:22px;box-shadow:0 22px 60px rgba(0,31,12,.18);padding:28px;display:grid;grid-template-columns:180px 1fr;gap:28px;align-items:center}
.logo img{width:100%;filter:drop-shadow(0 12px 16px rgba(0,31,12,.22))}
.kicker{display:inline-flex;padding:8px 15px;border-radius:999px;color:#fff;background:linear-gradient(135deg,var(--g),#0b6b2b);font-weight:950;font-size:13px;margin-bottom:12px}
h1{margin:0;color:var(--d);text-transform:uppercase;font-size:clamp(36px,6vw,68px);line-height:.96;letter-spacing:-1.5px;font-weight:1000}
p{font-size:17px;line-height:1.5;font-weight:650;color:#2c4638}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
a{display:inline-flex;align-items:center;justify-content:center;min-height:50px;padding:12px 16px;border-radius:13px;text-decoration:none;font-weight:1000;text-transform:uppercase;font-size:14px}
.primary{background:linear-gradient(135deg,var(--g),var(--d));color:#fff}
.secondary{background:#fff;color:var(--g);border:1px solid var(--line)}
.footer{position:relative;z-index:1;margin-top:14px;text-align:center;font-weight:800;color:var(--m)}
@media(max-width:760px){.card{grid-template-columns:1fr;text-align:center}.logo img{max-width:150px}.actions a{width:100%}}
</style>
</head>
<body>
<main>
  <section class="card">
    <div class="logo"><img src="assets/logo.png" alt="ES Blanquefort Basket Ball"></div>
    <div>
      <div class="kicker">🏀 PORTAIL LICENCIÉ</div>
      <h1>Préparer<br>la saison prochaine</h1>
      <p>Accès familles : questionnaire, identification, informations club, sondages à venir et lien essais.</p>
      <div class="actions">
        <a class="primary" href="portail-licencie/">Ouvrir le portail licencié</a>
        <a class="secondary" href="https://es-blanquefort-basket-ball.github.io/reinscription-2026-2027/">Questionnaire</a>
        <a class="secondary" href="https://es-blanquefort-basket-ball.github.io/essais-2026-2027/">Essais</a>
      </div>
    </div>
  </section>
  <div class="footer">Un club, deux couleurs, une passion.</div>
</main>
</body>
</html>
