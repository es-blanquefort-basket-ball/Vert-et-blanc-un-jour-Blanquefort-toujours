<!DOCTYPE html>
<html lang="fr">
<head>

<title>Interface coach</title>
<style>
body{font-family:Arial;margin:0;background:#f5f8f3;color:#082313}
header{background:#003914;color:white;padding:30px;text-align:center}
section{padding:18px}
.card{
background:white;
padding:18px;
border-radius:18px;
margin-bottom:14px;
border:1px solid #dce7db;
}
</style>

<body>
<header>
<h1>🏀 Interface coach</h1>
<p>Présences, créneaux, essais et tournois</p>
</header>

<section>
<div class="card">
<h2>Présences</h2>
<p>Suivi des réponses joueurs et parents.</p>
</div>

<div class="card">
<h2>Tournois reçus</h2>
<p>Organisation des équipes, transports et réponses.</p>
</div>

<div class="card">
<h2>Essais attendus</h2>
<p>Coordonnées parents et nouveaux joueurs.</p>
</div>
</section>
